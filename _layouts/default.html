<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noai, noimageai">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

  {%- comment -%} No-flash theme setter: runs before first paint. {%- endcomment -%}
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="masthead">
    <div class="masthead__bar">
      <a class="masthead__name" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch between light and dark theme">
        <span class="theme-toggle__label" aria-hidden="true"></span>
      </button>
    </div>
    {%- if page.url == "/" and site.summary %}
    <p class="masthead__summary">{{ site.summary }}</p>
    {%- endif %}
    <nav class="masthead__nav">
      <a href="{{ '/' | relative_url }}">Essays</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
    </nav>
  </header>

  <main id="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <span>© {{ site.title }}</span>
  </footer>

  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/sidenotes.js' | relative_url }}"></script>
</body>
</html>
